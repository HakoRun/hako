name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # hako-core links libfuse on Linux; install the headers so it builds.
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # hako-core links libfuse on Linux; install the headers so it builds.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Runs the real container runtime and asserts the isolation properties
  # (private PID view, no host $HOME, private /tmp, network isolation). This is
  # the only automated coverage of the security-critical transform.rs path.
  isolation:
    name: isolation (linux runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runtime prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor;
          # the rootless runtime needs them.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p hako-cli
      - name: Diagnose runtime environment
        continue-on-error: true
        run: |
          set +e
          echo "kernel: $(uname -r)"
          ls -l /dev/fuse
          echo "apparmor userns sysctl: $(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null)"
          unshare -Urn echo "unshare -Urn: OK"; echo "unshare rc=$?"
          W=$(mktemp -d); cd "$W"
          "$GITHUB_WORKSPACE/target/debug/hako" init
          echo "--- verbose run probe (stderr visible) ---"
          "$GITHUB_WORKSPACE/target/debug/hako" run --no-workspace main /bin/sh -c 'echo RUN_PROBE_OK'
          echo "run rc=$?"
      - name: Verify container isolation
        run: HAKO=target/debug/hako HAKO_RUN_FLAGS=--no-workspace bash scripts/isolation-check.sh
