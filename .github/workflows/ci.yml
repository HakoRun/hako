name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Runs the real container runtime and asserts its isolation properties
  # (private PID view, no host $HOME, private /tmp, network isolation, seccomp,
  # read-only /sys) — the only automated coverage of the security-critical
  # transform.rs path. Runs on BOTH x86_64 and native arm64, since seccomp-BPF
  # filters and syscall numbers are architecture-specific and the release ships
  # an aarch64 binary.
  isolation:
    name: isolation (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # arm64 runtime is not yet verified (the hosted arm64 runner's
    # userns/fuse support is still being characterized); keep it informational
    # so it can't block a release while we confirm whether failures there are a
    # runner limitation or a real bug. x86_64 stays blocking.
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runtime prerequisites
        run: |
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor;
          # the rootless runtime needs them. (No libfuse needed — hako mounts
          # via mount(2) directly.)
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p hako-cli --locked
      - name: Runtime environment probe
        run: |
          echo "arch: $(uname -m)   kernel: $(uname -r)"
          echo "apparmor userns restrict: $(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo n/a)"
          echo "max_user_namespaces: $(cat /proc/sys/user/max_user_namespaces 2>/dev/null || echo n/a)"
          unshare -Urn -- echo "unshare -Urn: OK" || echo "unshare -Urn: FAILED (exit $?)"
          ls -l /dev/fuse 2>&1 || echo "no /dev/fuse"
          echo "--- hako run with stderr visible ---"
          ./target/debug/hako init >/dev/null 2>&1 || true
          ./target/debug/hako run --no-workspace main /bin/sh -c 'echo HELLO_FROM_CONTAINER' || echo "hako run exit=$?"
      - name: Verify container isolation
        run: HAKO=target/debug/hako HAKO_RUN_FLAGS=--no-workspace bash scripts/isolation-check.sh

  # Builds the Windows/macOS wrappers with the Linux runtime embedded, on every
  # PR. This path previously ran only at release time, so a break (e.g. a macOS
  # build failure) merged green and only surfaced when cutting a tag. Build-only:
  # the embedded blob is a zero-byte stub here (build.rs creates it; an empty
  # blob just means "no embedded binary" at runtime), which is enough to compile
  # the include_bytes!/host-bridge embedded paths and catch breakage early.
  embedded-build:
    name: embedded build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p hako-cli --features embedded --locked
