# cargo-deny configuration — supply-chain and license policy.
# Run locally with: cargo deny check

[advisories]
version = 2
# Fail on packages pulled from a source with a known security advisory.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses compatible with shipping an MIT binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Surface, but don't yet fail on, duplicate dependency versions.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
